<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Live</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#0d1117;
color:white;
}

header{
background:#161b22;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#00ff88;
box-shadow:0 2px 10px rgba(0,0,0,.5);
}

.container{
padding:20px;
}

.card{
background:#1f2937;
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

.league{
color:#00ff88;
font-size:14px;
margin-bottom:10px;
}

.match{
display:flex;
justify-content:space-between;
align-items:center;
}

.team{
width:35%;
text-align:center;
font-size:18px;
}

.score{
font-size:24px;
font-weight:bold;
color:#00ff88;
}

.live{
background:red;
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-top:10px;
}
</style>

</head>

<body>

<header>
⚽ Goal Live
</header>

<div class="container">

<div class="card">

<div class="league">
الدوري الإنجليزي
</div>

<div class="match">

<div class="team">
Manchester City
</div>

<div class="score">
2 - 1
</div>

<div class="team">
Liverpool
</div>

</div>

<div class="live">
LIVE
</div>

</div>

</div>

</body>
</html>
